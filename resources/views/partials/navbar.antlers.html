<header class="w-full px-6 py-4 flex items-center justify-between">

    <div class="flex">
        <a href="/" class="flex items-center gap-2 pr-6 mr-6 border-r-2">
            <img src="/assets/logo/logo-jobbmedvann-primaer.svg" alt="Jobb med vann" class="h-8">
        </a>
        <h2 class="text-text">Norsk Vann</h2>
    </div>

    <div class="flex items-center gap-3">

        {{# Brukerknapp #}}
        <button class="p-2 rounded-full hover:bg-black/5 transition text-text">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 256 256">
                <path d="M230.92,212c-15.23-26.33-38.7-45.21-66.09-54.16a72,72,0,1,0-73.66,0C63.78,166.78,40.31,185.66,25.08,212a8,8,0,1,0,13.85,8c18.84-32.56,52.14-52,89.07-52s70.23,19.44,89.07,52a8,8,0,1,0,13.85-8ZM72,96a56,56,0,1,1,56,56A56.06,56.06,0,0,1,72,96Z" fill="currentColor"/>
            </svg>
        </button>
        
        {{# Søkeknapp #}}
        <button class="p-2 rounded-full hover:bg-black/5 transition text-text">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 256 256">
                <path d="M229.66,218.34l-50.07-50.07a88,88,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.31ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z" fill="currentColor"/>
            </svg>
        </button>

        {{# Hamburger #}}
        <button id="menu-btn" class="bg-text p-2 rounded-full hover:bg-black/5 transition text-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 256 256">
                <path d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128ZM40,72H216a8,8,0,0,0,0-16H40a8,8,0,0,0,0,16ZM216,184H40a8,8,0,0,0,0,16H216a8,8,0,0,0,0-16Z" fill="currentColor"/>
            </svg>
        </button>

    </div>

</header>

<div id="mobile-menu" class="hidden flex-col gap-4 px-6 pb-6 text-text">
    <a href="/stillinger" class="hover:opacity-70 transition">Stillinger</a>
    <a href="/utdanning" class="hover:opacity-70 transition">Utdanning</a>
    <a href="/ledige-jobber" class="hover:opacity-70 transition">Ledige jobber</a>
</div>

<script>
        document.getElementById('menu-btn').addEventListener('click', () => {
        document.getElementById('mobile-menu').classList.toggle('hidden');
        document.getElementById('mobile-menu').classList.toggle('flex');
    });
</script>
